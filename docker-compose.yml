services:
  verydisco:
    image: ghcr.io/yassirjabane/verydisco:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: verydisco
    ports:
      - "8086:8080"
    user: "1000:1000"
    volumes:
      # Mount the configuration file. It will be created automatically if it does not exist.
      - ./config.yml:/app/config.yml
      
      # SQLite database and weekly synchronized files directory
      - ./data:/data
      
      # Soulseek download folder sync target.
      # You can define SLSKD_DOWNLOADS_HOST_PATH in a .env file or replace it with a direct host path below.
      # Example: - /home/user/appdata/slskd/downloads:/slskd_downloads
      - ${SLSKD_DOWNLOADS_HOST_PATH:-./slskd_downloads}:/slskd_downloads

      # Main music library root (mount host music root, e.g., /navidrome/music:/music)
      # Each user sets their personal subfolder in the UI (e.g. /music/a, /music/b/playlists)
      - ${MUSIC_HOST_PATH:-./music}:/music
      
    restart: unless-stopped
